name: 'dbt_scd2_utils_integration_tests'
version: '1.0.0'
config-version: 2

require-dbt-version: [">=1.0.0"]

dbt-cloud:
  # Sourced from the environment so the internal dbt Cloud project id is not
  # committed to this repo. Set DBT_CLOUD_PROJECT_ID before running via the
  # dbt Cloud CLI, e.g. `export DBT_CLOUD_PROJECT_ID=...`.
  project-id: "{{ env_var('DBT_CLOUD_PROJECT_ID', '') }}"

#profile: 'integration_tests'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

flags:
  send_anonymous_usage_stats: false

seeds:
  dbt_scd2_utils_integration_tests:
    +quote_columns: false

models:
  dbt_scd2_utils_integration_tests:
    +materialized: table

tests:
  dbt_scd2_utils_integration_tests:
    +store_failures: true

vars:
  dbt_scd2_utils:
    update_all_previous_records: true
    is_current_column: _is_current
    valid_from_column: _valid_from
    valid_to_column: _valid_to
    updated_at_column: _updated_at
    change_type_column: _change_type
    created_at_column: _created_at
  default_valid_to: "2999-12-31 23:59:59"