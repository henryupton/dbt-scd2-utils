version: 2

models:
  - name: customers_scd2
    tests:
#      - dbt_utils.equality:
#          compare_model: ref('customers_scd2_result_{{ var("iteration", 1) }}')
#          compare_columns:
#            - customer_id
#            - customer_name
#            - email
#            - status
#            - _updated_at
#            - _valid_from
#            - _valid_to
#            - _is_current
#            - _change_type
      
      # SCD2 Data Quality Tests
      - dbt_scd2_utils.one_current_per_key:
          arguments:
            key_columns: [customer_id]
            current_column: _is_current

      - dbt_scd2_utils.no_validity_overlaps:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            valid_to_column: _valid_to

      - dbt_scd2_utils.continuous_validity_windows:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            valid_to_column: _valid_to

      - dbt_scd2_utils.first_record_not_update:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            change_type_column: _change_type

      - dbt_scd2_utils.latest_row_is_current:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            current_column: _is_current

      - dbt_scd2_utils.insert_follows_delete:
          arguments:
            key_columns: [customer_id]
            change_type_column: _change_type
            valid_from_column: _valid_from

      - dbt_scd2_utils.no_consecutive_inserts_or_deletes:
          arguments:
            key_columns: [customer_id]
            change_type_column: _change_type
            valid_from_column: _valid_from

      - dbt_scd2_utils.valid_window_well_formed:
          arguments:
            valid_from_column: _valid_from
            valid_to_column: _valid_to

  - name: born_deleted_scd2
    description: >
      Regression reproduction for the born-deleted edge case: a key whose first
      and only version arrives already soft-deleted. The record must be 'D',
      valid from deleted_at, and current. no_records_after_deletion is the
      primary guard (it asserts valid_from = deleted_at for deleted records).
    tests:
      - dbt_scd2_utils.one_current_per_key:
          arguments:
            key_columns: [customer_id]
            current_column: _is_current

      - dbt_scd2_utils.no_validity_overlaps:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            valid_to_column: _valid_to

      - dbt_scd2_utils.latest_row_is_current:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            current_column: _is_current

      - dbt_scd2_utils.no_records_after_deletion:
          arguments:
            key_columns: [customer_id]
            deleted_at_column: deleted_at
            valid_from_column: _valid_from
            valid_to_column: _valid_to

      - dbt_scd2_utils.first_record_not_update:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            change_type_column: _change_type

      - dbt_scd2_utils.insert_follows_delete:
          arguments:
            key_columns: [customer_id]
            change_type_column: _change_type
            valid_from_column: _valid_from

      - dbt_scd2_utils.continuous_validity_windows:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            valid_to_column: _valid_to

  - name: null_key_scd2
    description: >
      Regression reproduction for null-bearing unique keys. `region` is part
      of the unique_key but is NULL for one customer, whose key is re-reported
      across iterations. Both the incremental MERGE and the previous_record
      lookup must match on the null-safe surrogate hash of the key, not
      per-column raw equality — otherwise NULL = NULL (UNKNOWN) leaves the
      prior current row un-expired and re-inserts a fresh current version each
      run. Run via ./test_scd2_sequence.sh 1 2 null_key_scd2.
    tests:
      - dbt_scd2_utils.one_current_per_key:
          arguments:
            key_columns: [customer_id, region]
            current_column: _is_current

      - dbt_scd2_utils.no_validity_overlaps:
          arguments:
            key_columns: [customer_id, region]
            valid_from_column: _valid_from
            valid_to_column: _valid_to

      - dbt_scd2_utils.continuous_validity_windows:
          arguments:
            key_columns: [customer_id, region]
            valid_from_column: _valid_from
            valid_to_column: _valid_to

      - dbt_scd2_utils.latest_row_is_current:
          arguments:
            key_columns: [customer_id, region]
            valid_from_column: _valid_from
            current_column: _is_current

      - dbt_scd2_utils.first_record_not_update:
          arguments:
            key_columns: [customer_id, region]
            valid_from_column: _valid_from
            change_type_column: _change_type

      - dbt_scd2_utils.valid_window_well_formed:
          arguments:
            valid_from_column: _valid_from
            valid_to_column: _valid_to

  - name: customers_scd2_contract
    description: >
      Regression test for contract enforcement on the incremental_scd2
      materialization. The temp delta relation no longer triggers contract
      checks; the final relation's columns (including audit columns) must
      still match this YAML.
    config:
      contract:
        enforced: true
    columns:
      - name: customer_id
        data_type: number
      - name: customer_name
        data_type: varchar
      - name: email
        data_type: varchar
      - name: status
        data_type: varchar
      - name: deleted_at
        data_type: timestamp_tz
      - name: _updated_at
        data_type: timestamp_tz
      - name: _created_at
        data_type: timestamp_tz
      - name: _written_at
        data_type: timestamp_ntz
      - name: _is_current
        data_type: boolean
      - name: _valid_from
        data_type: timestamp_tz
      - name: _valid_to
        data_type: timestamp_tz
      - name: _change_type
        data_type: varchar
