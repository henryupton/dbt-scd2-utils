version: 2

models:
  - name: ooo_backfill_scd2
    description: >
      Regression reproduction: a late-arriving (out-of-order) record whose
      tracked columns are identical to the existing current record used to be
      removed by the `changes_only` hash de-duplication, leaving the existing
      current row un-expired and the backfilled row also marked current. With
      the fix (collapse_redundant_versions, default true) the stale version is
      deleted and a single current row remains.
    tests:
      - dbt_scd2_utils.one_current_per_key:
          arguments:
            key_columns: [customer_id]
            current_column: _is_current

      - dbt_scd2_utils.no_validity_overlaps:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            valid_to_column: _valid_to

      - dbt_scd2_utils.latest_row_is_current:
          arguments:
            key_columns: [customer_id]
            valid_from_column: _valid_from
            current_column: _is_current
